<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Human Biosignal AI Poster</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17181c;
        --muted: #5b6270;
        --line: #d8dde8;
        --page: #f5f7fb;
        --accent: #195db8;
        --accent-strong: #12427f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        background: var(--page);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .topbar {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
      }

      h1 {
        margin: 0;
        font-size: 1.15rem;
        line-height: 1.25;
        font-weight: 700;
      }

      .meta {
        margin-top: 2px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 8px 12px;
        color: #ffffff;
        background: var(--accent);
        font-size: 0.95rem;
        font-weight: 650;
        text-decoration: none;
        white-space: nowrap;
      }

      .button.secondary {
        color: var(--accent-strong);
        background: #ffffff;
      }

      .viewer {
        flex: 1;
        min-height: 0;
        background: #cfd6e4;
      }

      .poster-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      @media (max-width: 620px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions,
        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Human Biosignal AI Poster</h1>
        <div class="meta">IHPCSS poster</div>
      </div>
      <nav class="actions" aria-label="Poster actions">
        <a class="button secondary" href="./human-biosignal-ai-poster.pdf" target="_blank" rel="noopener">Open PDF</a>
        <a class="button" href="./human-biosignal-ai-poster.pdf" download>Download</a>
      </nav>
    </header>

    <main class="viewer">
      <iframe
        class="poster-frame"
        title="Human Biosignal AI Poster PDF"
        src="./human-biosignal-ai-poster.pdf"
      ></iframe>
    </main>
  </body>
</html>
